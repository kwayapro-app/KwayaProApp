<!-- kwayapro_app_icon_foreground.svg
     Adaptive-icon foreground layer: the "K" chorister mark only, no
     background — generated for Phase 6b (real Android launcher icons) by
     stripping the background <rect> from kwayapro_app_icon.svg, per
     docs/KwayaProBrandIndentity.html's documented mark geometry. Kept on
     the same 240x240 viewBox as the source so the mark's proportions/
     position are unchanged; flutter_launcher_icons applies its own
     adaptive-icon safe-zone inset on top of this. -->
<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <circle cx="88" cy="60" r="24" fill="#3C6040" />
  <path d="M 88 112 L 88 184" stroke="#6B4F00" stroke-width="36" stroke-linecap="round" />
  <path d="M 88 132 L 158 68 M 88 132 L 162 186" stroke="#6B4F00" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
</svg>
